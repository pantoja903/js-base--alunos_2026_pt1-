<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Seleciona os elementos do DOM
    const timerDisplay = document.getElementById('timer');
    const startButton = document.getElementById('startButton');
    const pauseButton = document.getElementById('pauseButton');
    const resetButton = document.getElementById('resetButton');

    // Variáveis do temporizador
    let counter = 0; // Contador começa em 0
    let intervalId = null; // ID do intervalo para controlar o temporizador

    // Função para atualizar o display do temporizador
    function updateDisplay() {
      timerDisplay.textContent = counter;
    }

    // Função para iniciar o temporizador
    function startTimer() {
      if (intervalId === null) { // Só inicia se não estiver rodando
        intervalId = setInterval(() => {
          counter++; // Incrementa o contador a cada segundo
          updateDisplay(); // Atualiza o display
        }, 1000); // A cada 1000ms (1 segundo)
      }
    }

    // Função para pausar o temporizador
    function pauseTimer() {
      if (intervalId !== null) {
        clearInterval(intervalId); // Para o intervalo
        intervalId = null; // Reseta o ID
      }
    }

    // Função para resetar o temporizador
    function resetTimer() {
      pauseTimer(); // Para o temporizador
      counter = 0; // Zera o contador
      updateDisplay(); // Atualiza o display
    }

    // Adiciona eventos de clique aos botões
    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', resetTimer);

    // Inicializa o display
    updateDisplay();
  </script>
</body>
</html>
