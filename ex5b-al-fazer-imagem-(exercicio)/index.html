<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5b: Troca de Imagem</title>
  <style>
    /* Estilo básico para centralizar a imagem e o texto */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    /* Contêiner para a imagem e o texto */
    .image-container {
      text-align: center;
    }

    /* Estilo da imagem */
    img {
      width: 200px; /* Largura fixa */
      height: 200px; /* Altura fixa */
      border: 2px solid black;
      border-radius: 10px; /* Borda arredondada */
      transition: transform 0.3s ease; /* Efeito de transição suave */
    }

    /* Efeito de escala ao passar o mouse */
    img:hover {
      transform: scale(1.05); /* Aumenta ligeiramente o tamanho */
    }

    /* Estilo do texto principal */
    #myText {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
    }

    /* Estilo do texto adicional */
    .subtext {
      margin-top: 10px;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>
  <!-- Contêiner para a imagem e o texto -->
  <div class="image-container">
    <!-- Imagem que será alterada -->
    <img id="myImage" src="tyler.jpg" alt="Imagem 1">

    <!-- Texto principal que será modificado -->
    <p id="myText">Passe o mouse sobre a imagem</p>

    <!-- Texto adicional -->
    <p class="subtext" id="subText">Tyler, The creator - Foda!</p>
  </div>

  <!-- Script JavaScript embutido na página -->
  <script>
    const img = document.getElementById('myImage');
    const myText = document.getElementById('myText');
    const subText = document.getElementById('subText');

    const originalSrc = img.src;
    const originalMain = myText.textContent;
    const originalSub = subText.textContent;

    const hoverLocal = 'bad.jpg';
    const hoverFallback = 'https://via.placeholder.com/200x200.png?text=bad.jpg';

    // Pré-carrega a imagem local; se não existir, usa fallback online
    let hoverSrc = hoverFallback;
    const tester = new Image();
    tester.onload = () => { hoverSrc = hoverLocal; };
    tester.onerror = () => { hoverSrc = hoverFallback; };
    tester.src = hoverLocal;

    img.addEventListener('mouseenter', () => {
      img.src = hoverSrc;
      myText.textContent = 'bad bunny - america não é so os estados unidos';
    });

    img.addEventListener('mouseleave', () => {
      img.src = originalSrc;
      myText.textContent = originalMain;
      subText.textContent = originalSub;
    });

    // Suporte para foco (acessibilidade/teclado)
    img.tabIndex = 0;
    img.addEventListener('focus', () => img.dispatchEvent(new Event('mouseenter')));
    img.addEventListener('blur', () => img.dispatchEvent(new Event('mouseleave')));
  </script>
</body>
</html>
