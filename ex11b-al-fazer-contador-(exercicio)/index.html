<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11b: Gerador de Citações</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #quote {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-align: center;
      max-width: 600px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #28a745;
      color: white;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <!-- Parágrafo para exibir a citação -->
  <p id="quote">Clique no botão para gerar uma citação.</p>

  <!-- Botão para gerar uma nova citação -->
  <button id="newQuoteButton">Nova Citação</button>

  <!-- Inclui o arquivo JavaScript -->
  <script src="script.js"></script>
</body>
</html>
